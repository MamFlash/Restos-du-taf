<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>LunchSquad 🍽️</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  // ⚠️ REMPLACE ces valeurs par ta config Firebase !
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  window.__firebase = { auth, db, GoogleAuthProvider, signInWithPopup, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged, updateProfile, collection, doc, setDoc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, where, serverTimestamp };
  window.__firebaseReady = true;
  window.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e10;--bg2:#16161a;--bg3:#1e1e24;--card:#1a1a20;
  --border:#2a2a35;--accent:#ff5c28;--accent2:#ffb347;
  --text:#f0ede8;--text2:#9896a0;--text3:#5e5d67;
  --green:#3ecf8e;--red:#ff4d6d;--blue:#4dabf7;
  --r:12px;--shadow:0 4px 24px rgba(0,0,0,.4);
  --sidebar:240px;--bnav:64px;--safe:env(safe-area-inset-bottom,0px)
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
h1,h2,h3,h4{font-family:'Syne',sans-serif}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* LOADING */
.loading{min-height:100vh;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;padding:20px}
.auth-wrap::before{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(255,92,40,.13) 0,transparent 70%);top:-100px;right:-100px;pointer-events:none}
.auth-wrap::after{content:'';position:absolute;width:350px;height:350px;background:radial-gradient(circle,rgba(255,179,71,.08) 0,transparent 70%);bottom:-50px;left:-50px;pointer-events:none}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 30px;width:100%;max-width:420px;position:relative;z-index:1;box-shadow:var(--shadow);animation:slideUp .4s ease}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:22px}
.auth-logo-icon{width:44px;height:44px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.auth-logo h1{font-size:24px;font-weight:800;letter-spacing:-.5px}.auth-logo h1 span{color:var(--accent)}
.auth-sub{color:var(--text2);font-size:14px;margin-bottom:22px;line-height:1.6}
.err{background:rgba(255,77,109,.1);border:1px solid rgba(255,77,109,.3);color:var(--red);border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:14px}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text3);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-sw{text-align:center;margin-top:16px;font-size:14px;color:var(--text2)}
.auth-sw a{color:var(--accent);cursor:pointer;text-decoration:underline}

/* INPUTS */
.ig{margin-bottom:14px}.ig label,.fr label{display:block;font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;letter-spacing:.6px;text-transform:uppercase}
.f{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;-webkit-appearance:none}
.f:focus{border-color:var(--accent)}.f::placeholder{color:var(--text3)}
textarea.f{resize:vertical;min-height:72px}select.f{cursor:pointer}
.fr{margin-bottom:14px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:15px;font-weight:500;cursor:pointer;border:none;transition:all .15s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.btn:active{transform:scale(.96)}.btn:disabled{opacity:.5;cursor:not-allowed}
.primary{background:var(--accent);color:#fff}.primary:hover{background:#ff6e3e}
.full{width:100%}
.google-btn{background:var(--bg2);border:1px solid var(--border);color:var(--text);width:100%;margin-top:10px}.google-btn:hover{border-color:var(--accent)}
.ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}.ghost:hover{border-color:var(--accent);color:var(--accent)}
.sm{padding:8px 13px;font-size:13px}
.icon-btn{padding:9px;border-radius:9px;font-size:16px}
.danger{background:rgba(255,77,109,.12);color:var(--red);border:1px solid rgba(255,77,109,.25)}.danger:hover{background:rgba(255,77,109,.22)}

/* APP SHELL */
.app{display:flex;height:100vh;height:100dvh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;z-index:50}
.s-logo{display:flex;align-items:center;gap:10px;padding:0 18px 18px;border-bottom:1px solid var(--border);margin-bottom:12px}
.s-logo-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.s-logo h2{font-size:17px;font-weight:800}.s-logo h2 span{color:var(--accent)}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 18px;cursor:pointer;color:var(--text2);font-size:14px;font-weight:500;transition:all .15s;border-left:3px solid transparent;margin:1px 0;user-select:none;-webkit-tap-highlight-color:transparent}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,.04)}
.nav-item.on{color:var(--accent);border-left-color:var(--accent);background:rgba(255,92,40,.08)}
.nav-icon{font-size:18px;width:24px;text-align:center}
.s-bottom{margin-top:auto;padding:14px 18px;border-top:1px solid var(--border)}
.ucard{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar{width:34px;height:34px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;overflow:hidden}
.avatar img{width:100%;height:100%;object-fit:cover}
.uname{font-size:13px;font-weight:500}.uemail{font-size:11px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:140px}

/* MAIN */
.main{flex:1;overflow-y:auto;padding:28px;background:var(--bg);-webkit-overflow-scrolling:touch}

/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:22px}
.ph-title{font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
.ph-sub{color:var(--text2);font-size:13px;margin-top:4px}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.sc{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 14px}
.sv{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;line-height:1}
.sl{color:var(--text2);font-size:11px;margin-top:5px;letter-spacing:.4px;text-transform:uppercase}
.ca{color:var(--accent)}.cg{color:var(--green)}.cb{color:var(--blue)}.co{color:var(--accent2)}

/* SEARCH */
.search{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:14px}
.search input{background:none;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;flex:1;min-width:0}
.search input::placeholder{color:var(--text3)}
.clr-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:18px;line-height:1;padding:0 2px}

/* FILTER TABS */
.ftabs{display:flex;gap:6px;margin-bottom:16px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.ftabs::-webkit-scrollbar{display:none}
.ftab{padding:6px 13px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text2);transition:all .15s;font-family:'DM Sans',sans-serif;white-space:nowrap;flex-shrink:0;-webkit-tap-highlight-color:transparent}
.ftab:hover{border-color:var(--accent);color:var(--accent)}.ftab.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:16px}
.rcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;transition:all .2s;cursor:pointer;-webkit-tap-highlight-color:transparent}
.rcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 8px 28px rgba(255,92,40,.14)}
.rcard:active{transform:scale(.98)}
.rcard-img{height:115px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:44px;position:relative}
.rbadge{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);backdrop-filter:blur(8px);border-radius:20px;padding:3px 9px;font-size:12px;font-weight:500}
.rbadge.fav{background:rgba(255,92,40,.3)}
.rcard-body{padding:13px}
.rname{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
.rmeta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;color:var(--text2);font-size:12px;margin-bottom:8px}
.dot{width:3px;height:3px;background:var(--text3);border-radius:50%;flex-shrink:0}
.ptag{font-weight:600;font-size:12px}.p1{color:var(--green)}.p2{color:var(--accent2)}.p3{color:var(--red)}
.tag{display:inline-flex;align-items:center;background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-size:11px;color:var(--text2)}
.stars{display:flex;gap:2px}
.star{color:var(--text3);cursor:pointer;transition:color .1s;user-select:none}.star.on{color:var(--accent2)}
.rfoot{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-top:1px solid var(--border)}
.rct{font-size:12px;color:var(--text3)}.ract{display:flex;gap:6px}

/* EMPTY */
.empty{text-align:center;padding:50px 20px;color:var(--text3)}
.empty .ei{font-size:44px;margin-bottom:14px}
.empty p{font-size:14px;margin-bottom:16px;line-height:1.5}

/* TOAST */
.toast{position:fixed;top:16px;right:16px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;box-shadow:var(--shadow);z-index:300;animation:slideInR .3s ease;max-width:min(300px,calc(100vw - 32px));font-size:14px}
.toast.ok{border-color:rgba(62,207,142,.4)}.toast.err{border-color:rgba(255,77,109,.4)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px;width:560px;max-width:100%;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow);animation:slideUp .3s ease;-webkit-overflow-scrolling:touch}
.mhead{padding:20px 20px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;position:sticky;top:0;background:var(--bg2);z-index:1;padding-bottom:14px;border-bottom:1px solid var(--border)}
.mtitle{font-size:19px;font-weight:800}
.mbody{padding:0 20px 20px}
.mclose{width:30px;height:30px;flex-shrink:0;background:var(--bg3);border:none;border-radius:8px;color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;transition:all .15s;-webkit-tap-highlight-color:transparent}
.mclose:hover{background:var(--border);color:var(--text)}

/* REVIEWS */
.ri{padding:12px 0;border-bottom:1px solid var(--border)}.ri:last-child{border-bottom:none}
.rih{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.ria{font-size:13px;font-weight:600}.rid{font-size:11px;color:var(--text3);margin-left:auto}
.rit{font-size:13px;color:var(--text2);line-height:1.5}

/* VOTE */
.vsession{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px}
.vopt{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:var(--bg2);border:2px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent}
.vopt:hover{border-color:var(--accent)}.vopt.on{border-color:var(--green);background:rgba(62,207,142,.05)}
.vbw{width:90px;height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.vb{height:100%;background:var(--green);border-radius:3px;transition:width .4s}

/* BOTTOM NAV */
.bnav{display:none;position:fixed;bottom:0;left:0;right:0;height:calc(var(--bnav) + var(--safe));background:var(--bg2);border-top:1px solid var(--border);z-index:50;padding-bottom:var(--safe)}
.bnav-inner{display:flex;height:var(--bnav)}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;color:var(--text3);font-size:11px;font-weight:500;transition:color .15s;-webkit-tap-highlight-color:transparent;border:none;background:none;font-family:'DM Sans',sans-serif;padding:0}
.bnav-item.on{color:var(--accent)}
.bni{font-size:22px;line-height:1}
.bnav-fab{flex:1;display:flex;align-items:center;justify-content:center;cursor:pointer;-webkit-tap-highlight-color:transparent;border:none;background:none}
.fab{width:48px;height:48px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 16px rgba(255,92,40,.4);transition:transform .15s}
.fab:active{transform:scale(.92)}

/* TWO COL */
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* ──────── RESPONSIVE ──────── */
@media(max-width:767px){
  .sidebar{display:none}
  .bnav{display:block}
  .app{flex-direction:column}
  .main{flex:1;overflow-y:auto;padding:16px 16px calc(var(--bnav) + var(--safe) + 16px)}
  /* bottom sheet */
  .overlay{align-items:flex-end;padding:0}
  .modal{border-radius:20px 20px 0 0;width:100%;max-width:100%;max-height:92dvh;border-bottom:none;animation:sheetUp .3s cubic-bezier(.32,.72,0,1)}
  .ph-title{font-size:21px}
  .stats{grid-template-columns:repeat(2,1fr);gap:10px}
  .sv{font-size:22px}
  .grid{grid-template-columns:1fr;gap:12px}
  .ph .btn{display:none}
  .toast{top:auto;bottom:calc(var(--bnav) + var(--safe) + 12px);right:12px;left:12px;max-width:100%}
  .two{grid-template-columns:1fr}
  .mhead{padding:16px 16px 0}
  .mbody{padding:0 16px 16px}
}
@media(min-width:768px) and (max-width:1024px){
  .stats{grid-template-columns:repeat(2,1fr)}
  .main{padding:22px}
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

const CE = {'Français':'🥐','Italien':'🍝','Japonais':'🍣','Thaïlandais':'🍜','Indien':'🍛','Mexicain':'🌮','Américain':'🍔','Chinois':'🥡','Méditerranéen':'🥗','Végétarien':'🥦','Pizzeria':'🍕','Libanais':'🧆','Coréen':'🍱','Autres':'🍽️'};
const CUISINES = Object.keys(CE);
const PL = [{v:1,l:'€ Bon marché'},{v:2,l:'€€ Moyen'},{v:3,l:'€€€ Cher'}];

function Toast({msg,type,onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3200);return()=>clearTimeout(t)},[]);
  return <div className={`toast ${type==='success'?'ok':'err'}`}><span>{type==='success'?'✅':'❌'}</span><span>{msg}</span></div>;
}

function Stars({value=0,onChange,readonly=false,size='md'}){
  const [hov,setHov]=useState(0);
  const fs={sm:13,md:15,lg:22,xl:26}[size]||15;
  return(
    <div className="stars">
      {[1,2,3,4,5].map(i=>(
        <span key={i} className={`star ${(hov||value)>=i?'on':''}`} style={{fontSize:fs,cursor:readonly?'default':'pointer'}}
          onClick={()=>!readonly&&onChange?.(i)} onMouseEnter={()=>!readonly&&setHov(i)} onMouseLeave={()=>!readonly&&setHov(0)}>★</span>
      ))}
    </div>
  );
}

function AuthScreen({fb,onToast}){
  const [mode,setMode]=useState('login');
  const [email,setEmail]=useState('');
  const [pw,setPw]=useState('');
  const [name,setName]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const fe=c=>({'auth/email-already-in-use':'Email déjà utilisé.','auth/weak-password':'Mot de passe trop court (6 min).','auth/user-not-found':'Aucun compte avec cet email.','auth/wrong-password':'Mot de passe incorrect.','auth/invalid-email':'Email invalide.','auth/invalid-credential':'Identifiants incorrects.'}[c]||'Erreur, réessaie.');
  async function handleEmail(e){
    e.preventDefault();setErr('');setLoading(true);
    try{
      if(mode==='register'){const c=await fb.createUserWithEmailAndPassword(fb.auth,email,pw);await fb.updateProfile(c.user,{displayName:name});await fb.setDoc(fb.doc(fb.db,'users',c.user.uid),{name,email,createdAt:new Date()});}
      else await fb.signInWithEmailAndPassword(fb.auth,email,pw);
    }catch(e){setErr(fe(e.code));}
    setLoading(false);
  }
  async function handleGoogle(){
    setErr('');setLoading(true);
    try{const p=new fb.GoogleAuthProvider();const c=await fb.signInWithPopup(fb.auth,p);await fb.setDoc(fb.doc(fb.db,'users',c.user.uid),{name:c.user.displayName,email:c.user.email,photoURL:c.user.photoURL,createdAt:new Date()},{merge:true});}
    catch(e){setErr(fe(e.code));}
    setLoading(false);
  }
  return(
    <div className="auth-wrap">
      <div className="auth-card">
        <div className="auth-logo"><div className="auth-logo-icon">🍽️</div><h1>Lunch<span>Squad</span></h1></div>
        <p className="auth-sub">Découvrez, notez et votez pour les restos du bureau. Fini les débats au moment du déj' !</p>
        {err&&<div className="err">{err}</div>}
        <form onSubmit={handleEmail}>
          {mode==='register'&&<div className="ig"><label>Prénom / Pseudo</label><input className="f" value={name} onChange={e=>setName(e.target.value)} placeholder="Alex" required/></div>}
          <div className="ig"><label>Email</label><input className="f" type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="alex@boite.fr" required/></div>
          <div className="ig"><label>Mot de passe</label><input className="f" type="password" value={pw} onChange={e=>setPw(e.target.value)} placeholder="••••••••" required/></div>
          <button className="btn primary full" type="submit" disabled={loading}>{loading?'…':mode==='login'?'→ Se connecter':'→ Créer mon compte'}</button>

function RestoModal({fb,user,resto,onClose,onToast}){
  const isEdit=!!resto;
  const [form,setForm]=useState({name:resto?.name||'',cuisine:resto?.cuisine||'Français',address:resto?.address||'',priceLevel:resto?.priceLevel||1,notes:resto?.notes||''});
  const [loading,setLoading]=useState(false);
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));
  async function save(){
    if(!form.name.trim())return;setLoading(true);
    try{
      const d={...form,priceLevel:Number(form.priceLevel),emoji:CE[form.cuisine]||'🍽️',updatedAt:fb.serverTimestamp()};
      if(isEdit){await fb.updateDoc(fb.doc(fb.db,'restaurants',resto.id),d);onToast('Restaurant mis à jour ✓','success');}
      else{await fb.addDoc(fb.collection(fb.db,'restaurants'),{...d,addedBy:user.uid,addedByName:user.displayName||user.email,avgRating:0,reviewCount:0,createdAt:fb.serverTimestamp()});onToast('Restaurant ajouté ! 🎉','success');}
      onClose();
    }catch(e){onToast('Erreur : '+e.message,'error');}
    setLoading(false);
  }
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="mhead"><h2 className="mtitle">{isEdit?'✏️ Modifier':'➕ Nouveau resto'}</h2><button className="mclose" onClick={onClose}>×</button></div>
        <div className="mbody">
          <div className="fr"><label>Nom *</label><input className="f" value={form.name} onChange={set('name')} placeholder="Le Petit Bistrot"/></div>
          <div className="fr two">
            <div><label>Cuisine</label><select className="f" value={form.cuisine} onChange={set('cuisine')}>{CUISINES.map(c=><option key={c}>{c}</option>)}</select></div>
            <div><label>Budget</label><select className="f" value={form.priceLevel} onChange={set('priceLevel')}>{PL.map(p=><option key={p.v} value={p.v}>{p.l}</option>)}</select></div>
          </div>
          <div className="fr"><label>Adresse</label><input className="f" value={form.address} onChange={set('address')} placeholder="12 rue de la Paix"/></div>
          <div className="fr"><label>Notes (optionnel)</label><textarea className="f" value={form.notes} onChange={set('notes')} placeholder="Réservation conseillée…"/></div>
          <div style={{display:'flex',gap:10,justifyContent:'flex-end',marginTop:4}}>
            <button className="btn ghost sm" onClick={onClose}>Annuler</button>
            <button className="btn primary sm" onClick={save} disabled={loading||!form.name.trim()}>{loading?'…':isEdit?'Enregistrer':'Ajouter'}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function RestoDetail({fb,user,resto,onClose,onToast}){
  const [reviews,setReviews]=useState([]);
  const [myR,setMyR]=useState(0);
  const [myCom,setMyCom]=useState('');
  const [myRev,setMyRev]=useState(null);
  const [sub,setSub]=useState(false);
  useEffect(()=>{
    const q=fb.query(fb.collection(fb.db,'reviews'),fb.where('restaurantId','==',resto.id),fb.orderBy('createdAt','desc'));
    return fb.onSnapshot(q,snap=>{
      const all=snap.docs.map(d=>({id:d.id,...d.data()}));
      setReviews(all);
      const mine=all.find(r=>r.userId===user.uid);
      if(mine){setMyRev(mine);setMyR(mine.rating);setMyCom(mine.comment||'');}
    });
  },[resto.id]);
  async function submit(){
    if(!myR)return;setSub(true);
    try{
      const d={restaurantId:resto.id,userId:user.uid,userName:user.displayName||user.email,userPhoto:user.photoURL||null,rating:myR,comment:myCom,createdAt:fb.serverTimestamp()};
      if(myRev)await fb.updateDoc(fb.doc(fb.db,'reviews',myRev.id),d);
      else await fb.addDoc(fb.collection(fb.db,'reviews'),d);
      const snap=await fb.getDocs(fb.query(fb.collection(fb.db,'reviews'),fb.where('restaurantId','==',resto.id)));
      const all=snap.docs.map(d=>d.data());
      const avg=all.reduce((s,r)=>s+r.rating,0)/all.length;
      await fb.updateDoc(fb.doc(fb.db,'restaurants',resto.id),{avgRating:Math.round(avg*10)/10,reviewCount:all.length});
      onToast('Avis enregistré ✓','success');
    }catch(e){onToast('Erreur','error');}
    setSub(false);
  }
  const ps=['','€','€€','€€€'][resto.priceLevel]||'';
  const pc=['','p1','p2','p3'][resto.priceLevel]||'p1';
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="mhead">
          <div style={{flex:1,minWidth:0}}>
            <h2 className="mtitle">{resto.emoji} {resto.name}</h2>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:6,flexWrap:'wrap'}}>
              <Stars value={Math.round(resto.avgRating||0)} readonly/>
              <span style={{fontSize:12,color:'var(--text2)'}}>{resto.avgRating?`${resto.avgRating}/5`:'Pas encore noté'}</span>
              <span className="dot"/><span className={`ptag ${pc}`}>{ps}</span>
              <span className="dot"/><span className="tag">{resto.cuisine}</span>
            </div>
          </div>
          <button className="mclose" onClick={onClose}>×</button>
        </div>
        <div className="mbody">
          {resto.address&&<div style={{fontSize:13,color:'var(--text2)',marginBottom:12}}>📍 {resto.address}</div>}
          {resto.notes&&<div style={{background:'var(--bg3)',borderRadius:8,padding:'10px 12px',fontSize:13,color:'var(--text2)',marginBottom:14,borderLeft:'3px solid var(--accent)'}}>{resto.notes}</div>}
          <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:14,marginBottom:16}}>
            <h4 style={{fontSize:13,fontWeight:600,marginBottom:10}}>{myRev?'✏️ Mon avis':'⭐ Laisser un avis'}</h4>
            <Stars value={myR} onChange={setMyR} size="xl"/>
            <textarea className="f" style={{marginTop:10}} value={myCom} onChange={e=>setMyCom(e.target.value)} placeholder="C'était comment ? (optionnel)"/>
            <button className="btn primary sm" style={{marginTop:10}} onClick={submit} disabled={!myR||sub}>{sub?'…':myRev?'Mettre à jour':'Publier'}</button>
          </div>
          <h4 style={{fontSize:13,fontWeight:600,marginBottom:10}}>💬 Avis de l'équipe ({reviews.length})</h4>
          {reviews.length===0?<p style={{fontSize:13,color:'var(--text3)',textAlign:'center',padding:'16px 0'}}>Soyez le premier à noter ce restaurant !</p>
            :reviews.map(r=>(
              <div key={r.id} className="ri">
                <div className="rih">
                  <div className="avatar" style={{width:26,height:26,fontSize:11}}>{r.userPhoto?<img src={r.userPhoto} alt=""/>:(r.userName?.[0]||'?').toUpperCase()}</div>
                  <span className="ria">{r.userId===user.uid?'Moi':r.userName}</span>
                  <Stars value={r.rating} readonly size="sm"/>
                  <span className="rid">{r.createdAt?.toDate?.()?.toLocaleDateString('fr-FR')||''}</span>
                </div>
                {r.comment&&<p className="rit">{r.comment}</p>}
              </div>
            ))
          }
        </div>
      </div>
    </div>
  );
}

function VoteModal({fb,user,restaurants,onClose,onToast}){
  const [sessions,setSessions]=useState([]);
  const [creating,setCreating]=useState(false);
  const [form,setForm]=useState({title:'',date:'',options:[]});
  const [loading,setLoading]=useState(false);
  useEffect(()=>fb.onSnapshot(fb.query(fb.collection(fb.db,'votes'),fb.orderBy('createdAt','desc')),snap=>setSessions(snap.docs.map(d=>({id:d.id,...d.data()})))),[]);
  async function create(){
    if(!form.title||form.options.length<2)return;setLoading(true);
    try{await fb.addDoc(fb.collection(fb.db,'votes'),{title:form.title,date:form.date,options:form.options,votes:{},createdBy:user.uid,createdByName:user.displayName||user.email,createdAt:fb.serverTimestamp(),active:true});setCreating(false);setForm({title:'',date:'',options:[]});onToast('Session créée ! 🗳️','success');}
    catch(e){onToast('Erreur','error');}
    setLoading(false);
  }
  async function vote(sid,rid){await fb.updateDoc(fb.doc(fb.db,'votes',sid),{[`votes.${user.uid}`]:rid});onToast('Vote enregistré ✓','success');}
  const tog=id=>setForm(f=>({...f,options:f.options.includes(id)?f.options.filter(x=>x!==id):[...f.options,id]}));
  const rm=Object.fromEntries(restaurants.map(r=>[r.id,r]));
  return(
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <div className="mhead"><h2 className="mtitle">🗳️ Votes déjeuner</h2><button className="mclose" onClick={onClose}>×</button></div>
        <div className="mbody">
          {!creating?<button className="btn primary full" style={{marginBottom:14}} onClick={()=>setCreating(true)}>➕ Créer une session de vote</button>:(
            <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,padding:14,marginBottom:14}}>
              <h4 style={{fontSize:13,fontWeight:600,marginBottom:12}}>Nouvelle session</h4>
              <div className="fr"><label>Titre</label><input className="f" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="Déj' vendredi"/></div>
              <div className="fr"><label>Date (optionnel)</label><input type="date" className="f" style={{colorScheme:'dark'}} value={form.date} onChange={e=>setForm({...form,date:e.target.value})}/></div>
              <div className="fr">
                <label>Choix proposés (min 2)</label>
                <div style={{maxHeight:170,overflowY:'auto',display:'flex',flexDirection:'column',gap:6}}>
                  {restaurants.map(r=>(
                    <label key={r.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:'var(--bg2)',borderRadius:8,cursor:'pointer',border:`1px solid ${form.options.includes(r.id)?'var(--accent)':'var(--border)'}`}}>
                      <input type="checkbox" checked={form.options.includes(r.id)} onChange={()=>tog(r.id)} style={{accentColor:'var(--accent)',width:16,height:16}}/>
                      <span style={{fontSize:14}}>{r.emoji} {r.name}</span>
                    </label>
                  ))}
                </div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button className="btn ghost sm" onClick={()=>setCreating(false)}>Annuler</button>
                <button className="btn primary sm" onClick={create} disabled={loading||!form.title||form.options.length<2}>{loading?'…':'Créer'}</button>
              </div>
            </div>
          )}
          {sessions.length===0?<div className="empty"><div className="ei">🗳️</div><p>Aucune session active.<br/>Crée-en une pour le prochain déj' collectif !</p></div>
            :sessions.map(s=>{
              const tot=Object.keys(s.votes||{}).length,myV=s.votes?.[user.uid];
              return(
                <div key={s.id} className="vsession">
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                    <h4 style={{fontFamily:'Syne',fontWeight:700,fontSize:15}}>{s.title}</h4>
                    <span style={{fontSize:11,color:'var(--text3)'}}>{tot} vote{tot!==1?'s':''}</span>
                  </div>
                  {s.date&&<p style={{fontSize:12,color:'var(--text3)',marginBottom:10}}>📅 {new Date(s.date).toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'})}</p>}
                  {(s.options||[]).map(rid=>{
                    const r=rm[rid];if(!r)return null;
                    const cnt=Object.values(s.votes||{}).filter(v=>v===rid).length;
                    const pct=tot>0?(cnt/tot)*100:0;
                    return(
                      <div key={rid} className={`vopt ${myV===rid?'on':''}`} onClick={()=>vote(s.id,rid)}>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <span>{r.emoji}</span><span style={{fontSize:14,fontWeight:500}}>{r.name}</span>
                          {myV===rid&&<span style={{fontSize:10,color:'var(--green)'}}>✓</span>}
                        </div>
                        <div style={{display:'flex',alignItems:'center',gap:8}}>
                          <div className="vbw"><div className="vb" style={{width:`${pct}%`}}/></div>
                          <span style={{fontSize:12,color:'var(--text2)',minWidth:14,textAlign:'right'}}>{cnt}</span>
                        </div>
                      </div>
                    );
                  })}
                  <p style={{fontSize:11,color:'var(--text3)',marginTop:6}}>Par {s.createdByName}</p>
                </div>
              );
            })
          }
        </div>
      </div>
    </div>
  );
}

function App(){
  const [fb,setFb]=useState(null);
  const [user,setUser]=useState(null);
  const [authLoad,setAuthLoad]=useState(true);
  const [page,setPage]=useState('restaurants');
  const [restos,setRestos]=useState([]);
  const [dataLoad,setDataLoad]=useState(true);
  const [search,setSearch]=useState('');
  const [fc,setFc]=useState('Tous');
  const [showAdd,setShowAdd]=useState(false);
  const [editR,setEditR]=useState(null);
  const [detailR,setDetailR]=useState(null);
  const [showVote,setShowVote]=useState(false);
  const [favs,setFavs]=useState([]);
  const [toast,setToast]=useState(null);
  const T=(msg,type='success')=>setToast({msg,type});

  useEffect(()=>{
    const init=()=>{if(window.__firebaseReady&&window.__firebase)setFb(window.__firebase);};
    if(window.__firebaseReady)init();else window.addEventListener('firebase-ready',init);
    return()=>window.removeEventListener('firebase-ready',init);
  },[]);
  useEffect(()=>{if(!fb)return;return fb.onAuthStateChanged(fb.auth,u=>{setUser(u);setAuthLoad(false);});},[fb]);
  useEffect(()=>{
    if(!fb||!user)return;
    return fb.onSnapshot(fb.query(fb.collection(fb.db,'restaurants'),fb.orderBy('createdAt','desc')),snap=>{setRestos(snap.docs.map(d=>({id:d.id,...d.data()})));setDataLoad(false);});
  },[fb,user]);
  useEffect(()=>{
    if(!fb||!user)return;
    return fb.onSnapshot(fb.doc(fb.db,'favorites',user.uid),snap=>{if(snap.exists())setFavs(snap.data().list||[]);});
  },[fb,user]);

  async function toggleFav(id,e){
    e?.stopPropagation();
    const ref=fb.doc(fb.db,'favorites',user.uid);
    const is=favs.includes(id);
    await fb.setDoc(ref,{list:is?favs.filter(x=>x!==id):[...favs,id]},{merge:true});
    T(is?'Retiré des favoris':'❤️ Ajouté aux favoris');
  }
  async function delResto(id,e){
    e?.stopPropagation();
    if(!confirm('Supprimer ce restaurant ?'))return;
    await fb.deleteDoc(fb.doc(fb.db,'restaurants',id));T('Supprimé');
  }

  const avgR=(()=>{const r=restos.filter(x=>x.avgRating);return r.length?(r.reduce((s,x)=>s+x.avgRating,0)/r.length).toFixed(1):'—';})();
  const filtered=restos.filter(r=>{
    const q=search.toLowerCase();
    return(!q||r.name.toLowerCase().includes(q)||r.cuisine?.toLowerCase().includes(q))
      &&(fc==='Tous'||r.cuisine===fc)
      &&(page!=='favorites'||favs.includes(r.id));
  });
  const ps=p=>['','€','€€','€€€'][p]||'';
  const pc=p=>['','p1','p2','p3'][p]||'p1';

  if(!fb||authLoad)return<div className="loading"><div className="spinner"/><p style={{color:'var(--text2)',fontSize:14}}>Chargement…</p></div>;
  if(!user)return<AuthScreen fb={fb} onToast={T}/>;

  const ini=(user.displayName||user.email||'?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();

  function bnav(id){
    if(id==='add'){setShowAdd(true);return;}
    if(id==='vote'){setShowVote(true);return;}
    if(id==='account'){if(confirm('Se déconnecter ?'))fb.signOut(fb.auth);return;}
    setPage(id);
  }

  return(
    <div className="app">
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}

      {/* Sidebar desktop */}
      <nav className="sidebar">
        <div className="s-logo"><div className="s-logo-icon">🍽️</div><h2>Lunch<span>Squad</span></h2></div>
        {[{id:'restaurants',icon:'🏪',l:'Tous les restos'},{id:'favorites',icon:'❤️',l:'Mes favoris'}].map(n=>(
          <div key={n.id} className={`nav-item ${page===n.id?'on':''}`} onClick={()=>setPage(n.id)}>
            <span className="nav-icon">{n.icon}</span>{n.l}
          </div>
        ))}
        <div className={`nav-item ${showVote?'on':''}`} onClick={()=>setShowVote(true)}>
          <span className="nav-icon">🗳️</span>Votes déjeuner
        </div>
        <div className="s-bottom">
          <div className="ucard">
            <div className="avatar">{user.photoURL?<img src={user.photoURL} alt=""/>:ini}</div>
            <div><div className="uname">{user.displayName||'Utilisateur'}</div><div className="uemail">{user.email}</div></div>
          </div>
          <button className="btn ghost sm" style={{width:'100%'}} onClick={()=>fb.signOut(fb.auth)}>→ Déconnexion</button>
        </div>
      </nav>

      {/* Main */}
      <main className="main">
        <div className="ph">
          <div>
            <h1 className="ph-title">{page==='favorites'?'❤️ Mes favoris':'🏪 Restaurants'}</h1>
            <p className="ph-sub">{page==='favorites'?`${filtered.length} restaurant${filtered.length!==1?'s':''} sauvegardé${filtered.length!==1?'s':''}`:`${restos.length} resto${restos.length!==1?'s':''} référencé${restos.length!==1?'s':''} par l'équipe`}</p>
          </div>
          <button className="btn primary sm" onClick={()=>setShowAdd(true)}>➕ Suggérer un resto</button>
        </div>

        <div className="stats">
          <div className="sc"><div className="sv ca">{restos.length}</div><div className="sl">Restaurants</div></div>
          <div className="sc"><div className="sv cg">{favs.length}</div><div className="sl">Mes favoris</div></div>
          <div className="sc"><div className="sv co">{avgR}</div><div className="sl">Note moy.</div></div>
          <div className="sc"><div className="sv cb">{restos.reduce((s,r)=>s+(r.reviewCount||0),0)}</div><div className="sl">Avis total</div></div>
        </div>

        <div className="search">
          <span style={{color:'var(--text3)'}}>🔍</span>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Rechercher un restaurant ou une cuisine…"/>
          {search&&<button className="clr-btn" onClick={()=>setSearch('')}>×</button>}
        </div>

        <div className="ftabs">
          {['Tous',...CUISINES].map(c=>(
            <button key={c} className={`ftab ${fc===c?'on':''}`} onClick={()=>setFc(c)}>
              {CE[c]?`${CE[c]} `:''}{c}
            </button>
          ))}
        </div>

        {dataLoad?<div style={{display:'flex',justifyContent:'center',padding:50}}><div className="spinner"/></div>
          :filtered.length===0?<div className="empty"><div className="ei">{page==='favorites'?'❤️':'🍽️'}</div><p>{page==='favorites'?"Aucun favori pour l'instant.":"Aucun restaurant ne correspond."}</p>{page!=='favorites'&&<button className="btn primary sm" onClick={()=>setShowAdd(true)}>➕ Suggérer un resto</button>}</div>
          :(
            <div className="grid">
              {filtered.map(r=>{
                const isFav=favs.includes(r.id);
                return(
                  <div key={r.id} className="rcard" onClick={()=>setDetailR(r)}>
                    <div className="rcard-img">
                      <span style={{fontSize:44}}>{r.emoji||'🍽️'}</span>
                      <div className={`rbadge ${isFav?'fav':''}`}>{isFav?'❤️':'☆'}</div>
                    </div>
                    <div className="rcard-body">
                      <div className="rname">{r.name}</div>
                      <div className="rmeta">
                        <span className="tag" style={{fontSize:11,padding:'2px 7px'}}>{r.cuisine}</span>
                        <span className="dot"/><span className={`ptag ${pc(r.priceLevel)}`}>{ps(r.priceLevel)}</span>
                        {r.address&&<><span className="dot"/><span style={{overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',maxWidth:110,fontSize:11}}>📍 {r.address}</span></>}
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <Stars value={Math.round(r.avgRating||0)} readonly size="sm"/>
                        <span style={{fontSize:12,color:'var(--text2)'}}>{r.avgRating?`${r.avgRating}/5`:'Non noté'}</span>
                      </div>
                    </div>
                    <div className="rfoot" onClick={e=>e.stopPropagation()}>
                      <span className="rct">💬 {r.reviewCount||0} avis</span>
                      <div className="ract">
                        <button className={`btn icon-btn sm ${isFav?'danger':'ghost'}`} onClick={e=>toggleFav(r.id,e)}>{isFav?'❤️':'🤍'}</button>
                        {r.addedBy===user.uid&&<>
                          <button className="btn icon-btn sm ghost" onClick={e=>{e.stopPropagation();setEditR(r);}}>✏️</button>
                          <button className="btn icon-btn sm danger" onClick={e=>delResto(r.id,e)}>🗑️</button>
                        </>}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )
        }
      </main>

      {/* Bottom nav mobile */}
      <nav className="bnav">
        <div className="bnav-inner">
          <button className={`bnav-item ${page==='restaurants'?'on':''}`} onClick={()=>bnav('restaurants')}><span className="bni">🏪</span><span>Restos</span></button>
          <button className={`bnav-item ${page==='favorites'?'on':''}`} onClick={()=>bnav('favorites')}><span className="bni">❤️</span><span>Favoris</span></button>
          <button className="bnav-fab" onClick={()=>bnav('add')}><div className="fab">➕</div></button>
          <button className={`bnav-item ${showVote?'on':''}`} onClick={()=>bnav('vote')}><span className="bni">🗳️</span><span>Voter</span></button>
          <button className="bnav-item" onClick={()=>bnav('account')}><span className="bni">👤</span><span>Compte</span></button>
        </div>
      </nav>

      {showAdd&&<RestoModal fb={fb} user={user} onClose={()=>setShowAdd(false)} onToast={T}/>}
      {editR&&<RestoModal fb={fb} user={user} resto={editR} onClose={()=>setEditR(null)} onToast={T}/>}
      {detailR&&<RestoDetail fb={fb} user={user} resto={detailR} onClose={()=>setDetailR(null)} onToast={T}/>}
      {showVote&&<VoteModal fb={fb} user={user} restaurants={restos} onClose={()=>setShowVote(false)} onToast={T}/>}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
